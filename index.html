<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คลังแบบทดสอบวิชาสังคมศึกษา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Sarabun', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(22, 163, 74, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(4, 120, 87, 0.16), transparent 35%),
        linear-gradient(180deg, #ecfdf5 0%, #ffffff 52%, #ecfdf5 100%);
      color: #1f2937;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #047857, #16a34a);
      color: white;
      text-align: center;
      padding: 46px 18px 40px;
      box-shadow: 0 4px 22px rgba(0,0,0,0.16);
    }

    header .badge {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.34);
      padding: 8px 18px;
      border-radius: 999px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.25;
      font-weight: 700;
    }

    header p {
      margin: 14px auto 0;
      max-width: 760px;
      font-size: clamp(16px, 2.2vw, 20px);
      line-height: 1.7;
      opacity: 0.96;
    }

    .container {
      max-width: 1120px;
      margin: 32px auto;
      padding: 0 18px 48px;
    }

    .topbar {
      background: white;
      border-radius: 24px;
      padding: 20px 22px;
      box-shadow: 0 8px 26px rgba(0,0,0,0.08);
      margin-bottom: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      border-left: 8px solid #16a34a;
    }

    .topbar h2 {
      margin: 0;
      color: #047857;
      font-size: 24px;
    }

    .topbar p {
      margin: 4px 0 0;
      color: #4b5563;
      line-height: 1.6;
    }

    .admin-link {
      text-decoration: none;
      background: #e5e7eb;
      color: #111827;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      white-space: nowrap;
    }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .quiz-card {
      background: rgba(255,255,255,0.97);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      border: 1px solid rgba(22, 163, 74, 0.16);
      display: flex;
      flex-direction: column;
      min-height: 340px;
    }

    .card-head {
      background: linear-gradient(135deg, #047857, #16a34a);
      color: white;
      padding: 24px 22px;
    }

    .card-head .tag {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.28);
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .card-head h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
    }

    .card-body {
      padding: 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .desc {
      color: #374151;
      line-height: 1.7;
      margin: 0 0 18px;
      flex: 1;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .meta div {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 14px;
      padding: 10px;
      text-align: center;
      color: #065f46;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.4;
    }

    .status {
      font-weight: 700;
      margin-bottom: 14px;
      color: #047857;
      min-height: 24px;
    }

    .start-button {
      display: block;
      text-align: center;
      text-decoration: none;
      background: linear-gradient(135deg, #16a34a, #047857);
      color: white;
      padding: 14px 20px;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(22, 163, 74, 0.25);
      transition: 0.2s;
    }

    .start-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(22, 163, 74, 0.34);
    }

    .disabled-card {
      opacity: 0.7;
    }

    .disabled-button {
      pointer-events: none;
      background: #9ca3af;
      box-shadow: none;
    }

    .coming-soon .card-head {
      background: linear-gradient(135deg, #6b7280, #9ca3af);
    }

    .coming-soon .start-button {
      pointer-events: none;
      background: #9ca3af;
      box-shadow: none;
    }

    footer {
      text-align: center;
      color: #6b7280;
      line-height: 1.8;
      padding: 10px 18px 38px;
    }

    @media (max-width: 960px) {
      .quiz-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 36px 16px 32px;
      }

      .quiz-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
      }

      .admin-link {
        text-align: center;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="badge">ระบบแบบทดสอบออนไลน์</div>
    <h1>คลังแบบทดสอบวิชาสังคมศึกษา</h1>
    <p>เลือกชุดแบบทดสอบที่ต้องการทำจากการ์ดด้านล่าง ระบบจะบันทึกและส่งผลให้ครูอัตโนมัติ</p>
  </header>

  <main class="container">
    <section class="topbar">
      <div>
        <h2>รายการแบบทดสอบ</h2>
      </div>
    </section>

    <section class="quiz-grid" id="quizGrid"></section>
  </main>

  <footer>
    จัดทำเพื่อใช้ประกอบการเรียนการสอนรายวิชาสังคมศึกษา<br>
    โดย ครูกฤษณพล ทองอุ่น<br>
    โรงเรียนเทพศิรินทร์ นนทบุรี
  </footer>

  <script>
    /*
      ใส่ Web App URL ของ Google Apps Script ตัวเดียวกับ quiz.html และ admin.html
      ถ้ายังไม่ใส่ URL ระบบจะแสดงการ์ดตามปกติ แต่จะยังตรวจสถานะเปิด/ปิดไม่ได้
    */
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxDoOUgSXVr0JFuGb6s6m4AnhVrH2U8xnIJZ-tkbQ_ddcDdtMy9Um0OPEQmzJMRK09V/exec";

    /*
      เพิ่มข้อสอบชุดใหม่ในอนาคต:
      1) สร้างไฟล์ข้อสอบใหม่ เช่น quiz-history.html
      2) เพิ่ม object ใหม่ในรายการ quizzes ด้านล่าง
    */
    const quizzes = [
      {
        id: "economics",
        title: "เศรษฐศาสตร์เบื้องต้น",
        subtitle: "ระบบเศรษฐกิจและตลาด",
        level: "ม.6",
        total: "30 ข้อ",
        choices: "5 ตัวเลือก",
        file: "quiz.html",
        statusText: "กำลังตรวจสอบสถานะ...",
        available: true
      },
      {
        id: "constitution",
        title: "รัฐธรรมนูญไทย",
        subtitle: "สิทธิ หน้าที่ และโครงสร้างอำนาจรัฐ",
        level: "ม.6",
        total: "เตรียมเพิ่ม",
        choices: "5 ตัวเลือก",
        file: "#",
        statusText: "ยังไม่เปิดใช้",
        available: false
      },
      {
        id: "geography",
        title: "ภูมิศาสตร์",
        subtitle: "ทรัพยากร สิ่งแวดล้อม และภูมิภาค",
        level: "ม.6",
        total: "เตรียมเพิ่ม",
        choices: "5 ตัวเลือก",
        file: "#",
        statusText: "ยังไม่เปิดใช้",
        available: false
      }
    ];

    function renderCards() {
      const grid = document.getElementById("quizGrid");
      grid.innerHTML = "";

      quizzes.forEach(quiz => {
        const card = document.createElement("article");
        card.className = "quiz-card" + (quiz.available ? "" : " coming-soon");
        card.id = "card-" + quiz.id;

        card.innerHTML = `
          <div class="card-head">
            <div class="tag">ระดับชั้น ${quiz.level}</div>
            <h3>${quiz.title}</h3>
          </div>

          <div class="card-body">
            <p class="desc">${quiz.subtitle}</p>

            <div class="meta">
              <div>${quiz.total}</div>
              <div>${quiz.choices}</div>
            </div>

            <div class="status" id="status-${quiz.id}">${quiz.statusText}</div>

            <a class="start-button ${quiz.available ? "" : "disabled-button"}" id="btn-${quiz.id}" href="${quiz.file}">
              ${quiz.available ? "เข้าสู่แบบทดสอบ" : "ยังไม่เปิดใช้"}
            </a>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function quizStatusCallback(data) {
      const status = document.getElementById("status-economics");
      const button = document.getElementById("btn-economics");
      const card = document.getElementById("card-economics");

      if (!status || !button || !card) return;

      if (!data || data.open !== true) {
        status.style.color = "#dc2626";
        status.innerHTML = "สถานะ: ยังไม่เปิดให้ทำ";
        button.classList.add("disabled-button");
        button.innerHTML = "ยังไม่เปิดให้ทำ";
        card.classList.add("disabled-card");
        return;
      }

      status.style.color = "#047857";
      status.innerHTML = "สถานะ: เปิดให้ทำแบบทดสอบ";
      button.classList.remove("disabled-button");
      button.innerHTML = "เข้าสู่แบบทดสอบ";
      card.classList.remove("disabled-card");
    }

    function loadQuizStatus() {
      if (!WEB_APP_URL || WEB_APP_URL.includes("PASTE_YOUR_GOOGLE_APPS_SCRIPT")) {
        const status = document.getElementById("status-economics");
        if (status) {
          status.innerHTML = "พร้อมใช้งาน";
          status.style.color = "#047857";
        }
        return;
      }

      const script = document.createElement("script");
      script.src = WEB_APP_URL + "?action=status&callback=quizStatusCallback&ts=" + Date.now();
      document.body.appendChild(script);
    }

    renderCards();
    loadQuizStatus();
  </script>
</body>
</html>
